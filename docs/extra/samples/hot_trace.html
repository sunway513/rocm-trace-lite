<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RTL Hot Trace — GPU Kernel Profiler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0f1a;
  --bg2:      #101525;
  --bg3:      #161d30;
  --border:   #1f2a45;
  --border2:  #2a3a5a;
  --text:     #d4daf0;
  --muted:    #6a7a9a;
  --dim:      #3a4a6a;
  --prefill:  #29d9ff;
  --decode:   #ff5c6a;
  --comm:     #ffcb35;
  --shared:   #7d93cc;
  --white:    #f0f4ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px)}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:18px 28px 14px;display:flex;align-items:flex-end;gap:28px;background:linear-gradient(180deg,#0d1222 0%,var(--bg) 100%);position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#29d9ff55,transparent)}
.logo-mark{font-family:'Chakra Petch',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;color:var(--muted);text-transform:uppercase;border:1px solid var(--border2);padding:3px 8px;border-radius:2px}
h1{font-family:'Chakra Petch',sans-serif;font-size:21px;font-weight:700;letter-spacing:2px;color:var(--white);text-transform:uppercase;margin-top:6px}
h1 span{color:var(--prefill)}
.header-right{margin-left:auto;text-align:right;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:10px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);padding:4px 10px;border-radius:2px;transition:all .15s}
.back-link:hover{color:var(--white);border-color:var(--border2);background:var(--bg3)}
.back-link::before{content:'←  '}

/* LEGEND */
.legend-bar{display:flex;align-items:center;gap:22px;padding:9px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
.leg{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.leg-sq{width:10px;height:10px;border-radius:1px;flex-shrink:0}
.legend-bar .hint{margin-left:auto;font-size:10px;color:var(--dim)}

/* MAIN */
.container{padding:20px 28px;display:flex;flex-direction:column;gap:18px}

/* CARD */
.card{border:1px solid var(--border);border-radius:5px;overflow:hidden;background:var(--bg2);position:relative;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-accent{position:absolute;top:0;left:0;bottom:0;width:3px}

/* Card header */
.card-head{display:flex;align-items:center;gap:14px;padding:11px 16px 11px 20px;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap}
.model-title{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;color:var(--white);letter-spacing:1px;flex:1;min-width:200px}
.tags{display:flex;gap:6px}
.tag{font-size:9px;font-weight:600;letter-spacing:2px;padding:2px 7px;border-radius:2px;text-transform:uppercase}
.tag-tp{background:#1a2240;color:var(--muted);border:1px solid var(--border2)}
.tag-qt{background:#131d35;color:#6fa0ff;border:1px solid #2040a0}
.card-stats{display:flex;gap:16px;font-size:10px;color:var(--muted)}
.stat-v{color:var(--text)}
.pills{display:flex;gap:5px}
.pill{font-size:9px;letter-spacing:1px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.pill-p{background:#29d9ff14;color:var(--prefill);border:1px solid #29d9ff35}
.pill-d{background:#ff5c6a14;color:var(--decode);border:1px solid #ff5c6a35}
.pill-c{background:#ffcb3514;color:var(--comm);border:1px solid #ffcb3535}

/* Timeline */
.tl-section{padding:10px 20px 6px;background:var(--bg)}
.tl-label{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
canvas.tl{width:100%;height:20px;display:block;border-radius:2px;border:1px solid var(--border);background:#060910}
.tl-row{margin-bottom:5px}

/* Breakdown */
.bk-row{display:flex;align-items:center;gap:12px;padding:6px 20px 10px;background:var(--bg)}
.bk-bar{flex:1;height:7px;display:flex;border-radius:3px;overflow:hidden;gap:1px}
.bk-seg{height:100%}
.bk-labs{display:flex;gap:14px}
.bk-lab{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.bk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Kernel columns */
.kernels{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.kcol{padding:13px 16px 13px 20px}
.kcol+.kcol{border-left:1px solid var(--border)}
.kcol-head{display:flex;align-items:center;gap:8px;font-family:'Chakra Petch',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid}
.kcol-head::before{content:'';width:3px;height:11px;border-radius:1px;flex-shrink:0}
.pf-head{color:var(--prefill);border-color:#29d9ff22}
.pf-head::before{background:var(--prefill);box-shadow:0 0 7px var(--prefill)}
.dc-head{color:var(--decode);border-color:#ff5c6a22}
.dc-head::before{background:var(--decode);box-shadow:0 0 7px var(--decode)}
.sh-head{color:var(--shared);border-color:var(--border);font-size:9px;letter-spacing:2px;margin-top:10px;margin-bottom:8px;padding-bottom:5px}
.sh-head::before{background:var(--shared)}

/* Kernel entry */
.ke{margin-bottom:8px}
.ke-name{font-size:11px;color:#9aabe0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-bottom:3px;cursor:default;transition:color .1s}
.ke-name:hover{color:var(--text)}
.ke-row{display:flex;align-items:center;gap:7px}
.ke-bg{flex:1;height:9px;background:#080d1a;border-radius:2px;overflow:hidden;border:1px solid #12193a}
.ke-bar{height:100%;border-radius:2px}
.ke-pct{font-size:10px;color:var(--muted);min-width:32px;text-align:right}
.ke-avg{font-size:9px;color:var(--dim);min-width:44px;text-align:right}
.ke-calls{font-size:9px;color:#3a5a2a;min-width:38px;text-align:right}
.no-ker{color:var(--dim);font-size:11px;font-style:italic;padding:8px 0}
.sh-divider{border-top:1px solid var(--border);margin-top:10px;padding-top:2px}

/* Tooltip */
#tip{position:fixed;z-index:9998;pointer-events:none;background:var(--bg3);border:1px solid var(--border2);padding:6px 10px;border-radius:3px;font-size:10px;color:var(--text);max-width:500px;word-break:break-all;display:none;line-height:1.7}

@media(max-width:820px){.kernels{grid-template-columns:1fr}.kcol+.kcol{border-left:none;border-top:1px solid var(--border)}}

/* Stagger in */
.card{animation:cardIn .35s ease both}
.card:nth-child(1){animation-delay:0.06s}
.card:nth-child(2){animation-delay:0.12s}
.card:nth-child(3){animation-delay:0.18s}
.card:nth-child(4){animation-delay:0.24s}
.card:nth-child(5){animation-delay:0.30s}
.card:nth-child(6){animation-delay:0.36s}
.card:nth-child(7){animation-delay:0.42s}
.card:nth-child(8){animation-delay:0.48s}
.card:nth-child(9){animation-delay:0.54s}
.card:nth-child(10){animation-delay:0.60s}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="tip"></div>
<header>
  <div>
    <div class="logo-mark">rocm-trace-lite v0.3.3</div>
    <h1>Hot <span>Trace</span> &mdash; Prefill vs Decode</h1>
  </div>
  <div class="header-right">
    MI355X &nbsp;&middot;&nbsp; Conc=64 &nbsp;&middot;&nbsp; ISL/OSL=1k/1k<br>

    <br><br>
    <a class="back-link" href="index.html">RTL Overview</a>
  </div>
</header>
<div class="legend-bar">

</div>

const PC_RAW={prefill:'#29d9ff',decode:'#ff5c6a',comm:'#ffcb35',shared:'#7d93cc'};
const LABELS={prefill:'Prefill',decode:'Decode',comm:'Comm',shared:'Shared'};
const tip=document.getElementById('tip');

document.addEventListener('mousemove',e=>{
  if(tip.style.display!=='none'){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';}
});

function kerHtml(k,maxP){
  const w=Math.max(2,(k.pct/maxP*100)).toFixed(1);
  const c=PC_RAW[k.phase]||PC_RAW.shared;
  return `<div class="ke">
<div class="ke-name" data-full="${k.full}">${k.name}</div>
<div class="ke-row">
  <div class="ke-bg"><div class="ke-bar" style="width:${w}%;background:${c}28;border:1px solid ${c}60;box-shadow:inset 0 0 6px ${c}18"></div></div>
  <div class="ke-pct">${k.pct.toFixed(1)}%</div>
  <div class="ke-avg">${k.avg_us}&micro;s</div>
  <div class="ke-calls">&times;${k.calls.toLocaleString()}</div>
</div></div>`;
}

function buildCard(m){
  const pfMax=m.prefill.length?Math.max(...m.prefill.map(k=>k.pct)):1;
  const dcMax=m.decode.length?Math.max(...m.decode.map(k=>k.pct)):1;
  const shMax=m.shared.length?Math.max(...m.shared.map(k=>k.pct)):1;
  const phases=['prefill','decode','comm','shared'];
  const bkBar=phases.map(ph=>{
    const p=m.breakdown[ph]||0;
    return p>0.3?`<div class="bk-seg" style="flex:${p};background:${PC_RAW[ph]}"></div>`:'';
  }).join('');
  const bkLabs=phases.filter(ph=>(m.breakdown[ph]||0)>0.5).map(ph=>
    `<div class="bk-lab"><div class="bk-dot" style="background:${PC_RAW[ph]}"></div>${LABELS[ph]} ${(m.breakdown[ph]||0).toFixed(0)}%</div>`
  ).join('');
  const pills=[
    m.breakdown.prefill>0.5?`<span class="pill pill-p">P ${m.breakdown.prefill.toFixed(0)}%</span>`:'',
    m.breakdown.decode>0.5?`<span class="pill pill-d">D ${m.breakdown.decode.toFixed(0)}%</span>`:'',
    m.breakdown.comm>0.5?`<span class="pill pill-c">C ${m.breakdown.comm.toFixed(0)}%</span>`:'',
  ].join('');
  const pfHTML=m.prefill.length?m.prefill.map(k=>kerHtml(k,pfMax)).join(''):'<div class="no-ker">No distinct prefill kernels</div>';
  const dcHTML=m.decode.length?m.decode.map(k=>kerHtml(k,dcMax)).join(''):'<div class="no-ker">No distinct decode kernels</div>';
  const shHTML=m.shared.slice(0,4).map(k=>kerHtml(k,shMax)).join('');
  const cid='cv_'+m.name.replace(/\W/g,'_');
  return `<div class="card">
<div class="card-accent" style="background:${m.accent};box-shadow:0 0 10px ${m.accent}70"></div>
<div class="card-head">
  <div class="model-title">${m.name}</div>
  <div class="tags"><span class="tag tag-tp">TP=${m.tp}</span><span class="tag tag-qt">${m.quant}</span></div>
  <div class="card-stats">
    <div>${m.total_ms.toLocaleString()} <span class="stat-v">ms</span></div>
    <div>${m.kernel_count} <span class="stat-v">kernels</span></div>
  </div>
  <div class="pills">${pills}</div>
</div>
<div class="tl-section">
  <div class="tl-label" style="margin-bottom:4px"><span>kernel execution stream</span><span>${m.segs.length} samples</span></div>
  <div class="tl-row"><span style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-right:6px">overview</span><canvas class="tl" id="${cid}_ov" height="20"></canvas></div>
  <div class="tl-row"><span style="font-size:9px;color:var(--prefill);letter-spacing:1px;text-transform:uppercase;opacity:.7;margin-right:6px">prefill</span><canvas class="tl" id="${cid}_pf" height="20"></canvas></div>
  <div class="tl-row" style="margin-bottom:0"><span style="font-size:9px;color:var(--decode);letter-spacing:1px;text-transform:uppercase;opacity:.7;margin-right:6px">decode</span><canvas class="tl" id="${cid}_dc" height="20"></canvas></div>
</div>
<div class="bk-row">
  <div class="bk-bar">${bkBar}</div>
  <div class="bk-labs">${bkLabs}</div>
</div>
<div class="kernels">
  <div class="kcol">
    <div class="kcol-head pf-head">Prefill Hot Kernels</div>
    ${pfHTML}
    <div class="sh-divider"><div class="kcol-head sh-head">Shared / Collective</div>${shHTML}</div>
  </div>
  <div class="kcol">
    <div class="kcol-head dc-head">Decode Hot Kernels</div>
    ${dcHTML}
    <div class="sh-divider"><div class="kcol-head sh-head">Shared / Collective</div>${shHTML}</div>
  </div>
</div></div>`;
}

const root=document.getElementById('root');
root.innerHTML=MODELS.map(buildCard).join('');

root.addEventListener('mouseover',e=>{
  const el=e.target.closest('.ke-name');
  if(el&&el.dataset.full){tip.textContent=el.dataset.full;tip.style.display='block';}
});
root.addEventListener('mouseout',e=>{
  if(e.target.closest('.ke-name'))tip.style.display='none';
});

requestAnimationFrame(()=>{
  const COLORS=['#29d9ff','#ff5c6a','#ffcb35','#7d93cc'];
  const H=20;

  // Draw a single 20px canvas strip.
  // viewStart/viewEnd: the % of the full timeline this canvas covers.
  // Segs are mapped into [0,W] based on their position within [viewStart, viewEnd].
  function drawStrip(cv, segs, viewStart, viewEnd, highlightPi){
    if(!cv)return;
    const W=cv.offsetWidth||1200;
    cv.width=W;
    const ctx=cv.getContext('2d');
    const span=viewEnd-viewStart;

    ctx.fillStyle='#060910';
    ctx.fillRect(0,0,W,H);

    segs.forEach(([x,w,pi])=>{
      // Skip segs outside this view window
      if(x+w<viewStart||x>viewEnd)return;
      // Clamp to view
      const cx=Math.max(x,viewStart);
      const cxEnd=Math.min(x+w,viewEnd);
      const px=(cx-viewStart)/span*W;
      const pw=Math.max(1,(cxEnd-cx)/span*W);

      if(highlightPi===null){
        // Overview: all phases, full height
        ctx.fillStyle=COLORS[pi];
        ctx.globalAlpha=(pi===3)?0.30:(pi===2)?0.65:0.92;
        ctx.fillRect(px,1,pw,H-2);
      } else {
        if(pi===highlightPi){
          // Target phase: full height, bright
          ctx.fillStyle=COLORS[pi];
          ctx.globalAlpha=0.95;
          ctx.fillRect(px,1,pw,H-2);
          // Top shine
          ctx.fillStyle='rgba(255,255,255,0.2)';
          ctx.globalAlpha=1;
          ctx.fillRect(px,1,pw,2);
        } else if(pi===2||pi===3){
          // Shared/comm: half-height dimmed bar at bottom
          ctx.fillStyle=COLORS[pi];
          ctx.globalAlpha=0.20;
          ctx.fillRect(px,Math.floor(H*0.6),pw,Math.floor(H*0.4));
        }
        // Other phase (not target, not shared): skip
      }
    });
    ctx.globalAlpha=1;

    // Subtle gloss
    const gl=ctx.createLinearGradient(0,0,0,H);
    gl.addColorStop(0,'rgba(255,255,255,0.04)');
    gl.addColorStop(1,'rgba(0,0,0,0.15)');
    ctx.fillStyle=gl;ctx.fillRect(0,0,W,H);
  }

  MODELS.forEach(m=>{
    const cid='cv_'+m.name.replace(/\W/g,'_');

    // Find time range of prefill and decode segments
    const pfSegs=m.segs.filter(s=>s[2]===0);
    const dcSegs=m.segs.filter(s=>s[2]===1);

    function rangeOf(ss,pad=3){
      if(!ss.length)return[0,100];
      const mn=Math.min(...ss.map(s=>s[0]));
      const mx=Math.max(...ss.map(s=>s[0]+s[1]));
      return[Math.max(0,mn-pad),Math.min(100,mx+pad)];
    }
    const[pfStart,pfEnd]=rangeOf(pfSegs);
    const[dcStart,dcEnd]=rangeOf(dcSegs);

    // Overview: full [0,100]
    drawStrip(document.getElementById(cid+'_ov'),m.segs,0,100,null);
    // Prefill strip: zoomed to where prefill kernels actually are
    drawStrip(document.getElementById(cid+'_pf'),m.segs,pfStart,pfEnd,0);
    // Decode strip: zoomed to where decode kernels actually are
    drawStrip(document.getElementById(cid+'_dc'),m.segs,dcStart,dcEnd,1);
  });
});
</script>
</body>
</html>
