name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-wheel:
    name: Build wheel (ROCm 7.2)
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y python3-pip python3-venv sqlite3 libsqlite3-dev
          python3 -m pip install build wheel setuptools

      - name: Build librpd_lite.so
        run: make -j$(nproc)

      - name: Verify no forbidden deps
        run: |
          ldd librpd_lite.so
          ldd librpd_lite.so | grep -E "roctracer|rocprofiler-sdk" && exit 1 || echo "Clean"

      - name: Stage .so into package
        run: |
          mkdir -p rocm_trace_lite/lib
          cp librpd_lite.so rocm_trace_lite/lib/

      - name: Build wheel
        run: python3 -m build --wheel --no-isolation

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          rpd-lite --version
          python3 -c "from rocm_trace_lite import get_lib_path; print(get_lib_path())"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  release:
    name: Create GitHub Release
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create $TAG dist/*.whl \
            --repo ${{ github.repository }} \
            --title "rocm-trace-lite $TAG" \
            --notes "$(cat <<'EOF'
          ## Installation

          ```bash
          pip install rocm_trace_lite-*.whl
          ```

          ## Usage

          ```bash
          rpd-lite trace python3 my_model.py
          rpd-lite summary trace.rpd
          rpd-lite convert trace.rpd -o trace.json
          rpd-lite info trace.rpd
          ```

          ## Requirements
          - ROCm 6.2+ or 7.x
          - Linux x86_64
          EOF
          )"
