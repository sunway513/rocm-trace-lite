name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-wheel:
    name: Build wheel (ROCm 7.2)
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y python3-pip python3-venv python3-full sqlite3 libsqlite3-dev
          python3 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install build wheel setuptools

      - name: Build librtl.so
        run: make -j$(nproc)

      - name: Verify no forbidden deps
        run: |
          ldd librtl.so
          ldd librtl.so | grep -E "roctracer|rocprofiler-sdk|libroctx64" && exit 1 || echo "Clean"

      - name: Stage .so into package
        run: |
          mkdir -p rocm_trace_lite/lib
          cp librtl.so rocm_trace_lite/lib/

      - name: Build wheel
        run: /tmp/build-venv/bin/python -m build --wheel --no-isolation

      - name: Verify wheel contents
        run: |
          /tmp/build-venv/bin/pip install dist/*.whl
          /tmp/build-venv/bin/rpd-lite --version
          /tmp/build-venv/bin/python -c "from rocm_trace_lite import get_lib_path; print(get_lib_path())"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  release:
    name: Create GitHub Release
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create $TAG dist/*.whl \
            --repo ${{ github.repository }} \
            --title "rocm-trace-lite $TAG" \
            --notes "$(cat <<'EOF'
          ## Installation

          ```bash
          pip install rocm_trace_lite-*.whl
          ```

          ## Usage

          ```bash
          rtl trace python3 my_model.py
          ```

          This generates the trace database, prints a kernel summary, and produces a compressed Perfetto JSON — all in one command.

          ## Requirements
          - ROCm 6.2+ or 7.x
          - Linux x86_64
          EOF
          )"
