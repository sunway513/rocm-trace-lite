name: GPU Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GPU_CONTAINER: rocm/dev-ubuntu-24.04:latest

jobs:
  gpu-single:
    name: GPU tests (single MI355X)
    runs-on: linux-rocm-trace-lite-mi355-1
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests in container
        run: |
          set -o pipefail
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri \
            --group-add render --group-add video \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.GPU_CONTAINER }} \
            bash -c '
              set -e

              # Build librtl.so + HIP test workload
              apt-get update -qq && apt-get install -y -qq libsqlite3-dev python3-pip > /dev/null 2>&1
              make -j$(nproc)
              make tests/gpu_workload
              mkdir -p rocm_trace_lite/lib && cp librtl.so rocm_trace_lite/lib/

              # Install Python test deps (no PyTorch)
              pip install --break-system-packages pytest pytest-timeout -e .

              # Verify GPU via HIP (no torch)
              ./tests/gpu_workload noop
              echo "GPU verified via HIP"

              # Run GPU tests
              python3 -m pytest tests/test_gpu_hip.py -v --tb=short --timeout=120 2>&1 | tee /workspace/gpu-test-results.txt

              # Guard: fail if no GPU tests passed
              gpu_passed=$(grep -c "PASSED" /workspace/gpu-test-results.txt || echo 0)
              echo "GPU tests passed: $gpu_passed"
              if [ "$gpu_passed" -lt 5 ]; then
                echo "FATAL: fewer than 5 GPU tests passed"
                exit 1
              fi
            '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-single-results
          path: gpu-test-results.txt

  gpu-multi:
    name: GPU tests (8x MI355X, optional)
    runs-on: linux-rocm-trace-lite-mi355-8
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests in container
        run: |
          set -o pipefail
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri \
            --group-add render --group-add video \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.GPU_CONTAINER }} \
            bash -c '
              set -e

              # Build librtl.so + HIP test workload
              apt-get update -qq && apt-get install -y -qq libsqlite3-dev python3-pip > /dev/null 2>&1
              make -j$(nproc)
              make tests/gpu_workload
              mkdir -p rocm_trace_lite/lib && cp librtl.so rocm_trace_lite/lib/

              # Install Python test deps (no PyTorch)
              pip install --break-system-packages pytest pytest-timeout -e .

              # Verify GPU
              ./tests/gpu_workload noop
              echo "GPU verified via HIP"

              # Run all tests (GPU HIP + CPU)
              python3 -m pytest tests/test_gpu_hip.py tests/ -v --tb=short --timeout=180 2>&1 | tee /workspace/gpu-test-results.txt

              # Guard
              gpu_passed=$(grep -c "PASSED" /workspace/gpu-test-results.txt || echo 0)
              echo "GPU tests passed: $gpu_passed"
              if [ "$gpu_passed" -lt 10 ]; then
                echo "FATAL: fewer than 10 tests passed"
                exit 1
              fi
            '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-multi-results
          path: gpu-test-results.txt
