name: GPU Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # ROCm PyTorch container with matching ROCm + torch
  GPU_CONTAINER: rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.8.0

jobs:
  gpu-single:
    name: GPU tests (single MI355X)
    runs-on: linux-rocm-trace-lite-mi355-1
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests in container
        run: |
          set -o pipefail
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri \
            --group-add render --group-add video \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.GPU_CONTAINER }} \
            bash -c '
              set -e

              # Build
              apt-get update -qq && apt-get install -y -qq libsqlite3-dev > /dev/null 2>&1
              make -j$(nproc)
              mkdir -p rocm_trace_lite/lib && cp librtl.so rocm_trace_lite/lib/

              # Install
              pip install pytest pytest-timeout -e . 2>&1 | tail -1

              # Verify GPU is actually usable
              python3 -c "import torch; n=torch.cuda.device_count(); print(\"GPUs:\", n); assert n > 0 and torch.cuda.is_available()"

              # Run tests
              python3 -m pytest tests/ -v --tb=short -k "not multigpu" --timeout=120 2>&1 | tee /workspace/gpu-test-results.txt

              # CRITICAL: fail if all GPU tests were skipped
              gpu_passed=$(grep -c "PASSED.*test_gpu\|PASSED.*test_release_validation.*test_overhead\|PASSED.*test_combined\|PASSED.*test_cli_multi\|PASSED.*test_roctx_e2e\|PASSED.*test_hipgraph" /workspace/gpu-test-results.txt || echo 0)
              echo "GPU tests actually passed: $gpu_passed"
              if [ "$gpu_passed" -lt 5 ]; then
                echo "FATAL: fewer than 5 GPU tests passed — likely all skipped"
                exit 1
              fi
            '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-single-results
          path: gpu-test-results.txt

  gpu-multi:
    name: GPU tests (8x MI355X, optional)
    runs-on: linux-rocm-trace-lite-mi355-8
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests in container
        run: |
          set -o pipefail
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri \
            --group-add render --group-add video \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.GPU_CONTAINER }} \
            bash -c '
              set -e

              # Build
              apt-get update -qq && apt-get install -y -qq libsqlite3-dev > /dev/null 2>&1
              make -j$(nproc)
              mkdir -p rocm_trace_lite/lib && cp librtl.so rocm_trace_lite/lib/

              # Install
              pip install pytest pytest-timeout -e . 2>&1 | tail -1

              # Verify GPU
              python3 -c "import torch; n=torch.cuda.device_count(); print(\"GPUs:\", n); assert n >= 2 and torch.cuda.is_available()"

              # Run all tests
              python3 -m pytest tests/ -v --tb=short --timeout=180 2>&1 | tee /workspace/gpu-test-results.txt

              # CRITICAL: fail if GPU tests were skipped
              gpu_passed=$(grep -c "PASSED.*test_gpu\|PASSED.*test_release_validation.*test_overhead\|PASSED.*test_combined\|PASSED.*test_cli_multi\|PASSED.*test_roctx_e2e\|PASSED.*test_hipgraph\|PASSED.*test_gpu_combo\|PASSED.*multigpu" /workspace/gpu-test-results.txt || echo 0)
              echo "GPU tests actually passed: $gpu_passed"
              if [ "$gpu_passed" -lt 5 ]; then
                echo "FATAL: fewer than 5 GPU tests passed — likely all skipped"
                exit 1
              fi
            '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-multi-results
          path: gpu-test-results.txt
