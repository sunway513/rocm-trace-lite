name: GPU Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gpu-single:
    name: GPU tests (single MI355X)
    runs-on: linux-rocm-trace-lite-mi355-1
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y libsqlite3-dev sqlite3 2>/dev/null || \
          sudo apt-get update && sudo apt-get install -y libsqlite3-dev sqlite3 2>/dev/null || \
          echo "sqlite3-dev may already be installed"

      - name: Build librtl.so
        run: |
          make -j$(nproc)
          mkdir -p rocm_trace_lite/lib
          cp librtl.so rocm_trace_lite/lib/

      - name: Install test deps
        run: |
          pip install --break-system-packages pytest pytest-timeout -e . || pip install pytest pytest-timeout -e .
          python3 -m torch.utils.collect_env 2>/dev/null || \
            pip install --break-system-packages torch --index-url https://download.pytorch.org/whl/rocm6.2.4 2>/dev/null || \
            echo "WARNING: torch not available, GPU tests will be skipped"

      - name: Verify GPU access
        run: |
          echo "=== ROCm SMI ==="
          rocm-smi --showid || true
          echo "=== HSA Agents ==="
          ls -la /dev/kfd /dev/dri/render* 2>/dev/null || true
          echo "=== PyTorch GPU ==="
          python3 -c "import torch; n = torch.cuda.device_count(); print('GPUs:', n); assert n > 0" || {
            echo "FATAL: No GPU visible to PyTorch — GPU tests cannot run"
            exit 1
          }

      - name: Run single-GPU tests
        run: |
          set -o pipefail
          python3 -m pytest tests/ -v --tb=short \
            -k "not multigpu" \
            --timeout=120 \
            2>&1 | tee gpu-test-results.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-single-results
          path: gpu-test-results.txt

  gpu-multi:
    name: GPU tests (8x MI355X)
    runs-on: linux-rocm-trace-lite-mi355-8
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y libsqlite3-dev sqlite3 2>/dev/null || \
          sudo apt-get update && sudo apt-get install -y libsqlite3-dev sqlite3 2>/dev/null || \
          echo "sqlite3-dev may already be installed"

      - name: Build librtl.so
        run: |
          make -j$(nproc)
          mkdir -p rocm_trace_lite/lib
          cp librtl.so rocm_trace_lite/lib/

      - name: Install test deps
        run: |
          pip install --break-system-packages pytest pytest-timeout -e . || pip install pytest pytest-timeout -e .
          python3 -m torch.utils.collect_env 2>/dev/null || \
            pip install --break-system-packages torch --index-url https://download.pytorch.org/whl/rocm6.2.4 2>/dev/null || \
            echo "WARNING: torch not available, GPU tests will be skipped"

      - name: Verify GPU access
        run: |
          echo "=== ROCm SMI ==="
          rocm-smi --showid || true
          echo "=== HSA Agents ==="
          ls -la /dev/kfd /dev/dri/render* 2>/dev/null || true
          echo "=== PyTorch GPU ==="
          python3 -c "import torch; n = torch.cuda.device_count(); print('GPUs:', n); assert n > 0" || {
            echo "FATAL: No GPU visible to PyTorch — GPU tests cannot run"
            exit 1
          }

      - name: Run all tests including multi-GPU
        run: |
          set -o pipefail
          python3 -m pytest tests/ -v --tb=short \
            --timeout=180 \
            2>&1 | tee gpu-test-results.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-multi-results
          path: gpu-test-results.txt
