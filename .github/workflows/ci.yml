name: CI (no GPU)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  source-guard:
    name: Source dependency guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No roctracer/rocprofiler-sdk includes
        run: |
          if grep -rn '#include.*roctracer\|#include.*rocprofiler-sdk' src/*.cpp src/*.h; then
            echo "FAIL: forbidden includes found"
            exit 1
          fi
          echo "PASS"

      - name: No forbidden linker flags
        run: |
          if grep -E '\-lroctracer|\-lrocprofiler-sdk|\-lroctx64' Makefile; then
            echo "FAIL: forbidden linker flags"
            exit 1
          fi
          echo "PASS"

      - name: All files present
        run: |
          for f in src/rpd_lite.h src/rpd_lite.cpp src/hsa_intercept.cpp \
                   src/roctx_shim.cpp src/hip_intercept.cpp \
                   tools/rpd2trace.py tools/rpd_lite.sh Makefile; do
            test -f $f || { echo "MISSING: $f"; exit 1; }
          done
          echo "PASS"

  python-tests:
    name: Python tests (41 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        working-directory: tests
        run: pytest -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check rocm_trace_lite/ tools/rpd2trace.py tests/ --select=E,F,W --ignore=E501,E402

      - name: Shell syntax
        run: bash -n tools/rpd_lite.sh

  build:
    name: Build (ROCm container)
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: apt-get update && apt-get install -y sqlite3 libsqlite3-dev

      - name: Build librpd_lite.so
        run: make -j$(nproc)

      - name: Verify no forbidden deps
        run: |
          ldd librpd_lite.so
          ldd librpd_lite.so | grep -E "roctracer|rocprofiler-sdk|libroctx64" && exit 1 || echo "Clean"

      - name: Verify .so exports expected symbols
        run: |
          nm -D librpd_lite.so | grep "T OnLoad" || { echo "FAIL: OnLoad not exported"; exit 1; }
          nm -D librpd_lite.so | grep "T OnUnload" || { echo "FAIL: OnUnload not exported"; exit 1; }
          nm -D librpd_lite.so | grep "T roctxRangePushA" || { echo "FAIL: roctx shim not exported"; exit 1; }
          nm -D librpd_lite.so | grep "T roctxRangePop" || { echo "FAIL: roctx shim not exported"; exit 1; }
          nm -D librpd_lite.so | grep "T roctxMarkA" || { echo "FAIL: roctx shim not exported"; exit 1; }
          echo "PASS: all expected symbols exported"

  ai-review:
    name: GPT-5.4 Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install openai
        run: pip install openai

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Review with GPT-5.4
        if: steps.diff.outputs.diff_size != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL }}
        run: |
          cat > /tmp/review.py << 'PYEOF'
          import os, sys
          from openai import OpenAI

          client = OpenAI()
          model = os.environ.get("REVIEW_MODEL", "gpt-5.4")

          with open("/tmp/pr.diff") as f:
              diff = f.read()

          # Truncate if too large (token limit)
          if len(diff) > 80000:
              diff = diff[:80000] + "\n\n... [diff truncated, too large for review] ..."

          response = client.chat.completions.create(
              model=model,
              messages=[
                  {"role": "system", "content": """You are a senior GPU systems engineer reviewing code for rocm-trace-lite,
          a self-contained GPU kernel profiler for ROCm that must have ZERO dependency on roctracer or rocprofiler-sdk.

          Review the PR diff for:
          1. **Dependency violations** — any reference to roctracer, rocprofiler-sdk, libroctx64
          2. **Correctness** — HSA API usage, SQLite thread safety, signal handling
          3. **Performance** — hot-path allocations, lock contention, thread-per-dispatch concerns
          4. **Security** — buffer overflows, format string bugs, unchecked returns
          5. **Style** — consistency with existing code

          Be concise. Flag only real issues, not style nitpicks. Use markdown.
          Start with a one-line verdict: LGTM, MINOR ISSUES, or NEEDS CHANGES."""},
                  {"role": "user", "content": f"Review this PR diff:\n\n```diff\n{diff}\n```"}
              ],
              temperature=0.2,
              max_completion_tokens=2000,
          )

          review = response.choices[0].message.content
          print(review)

          with open("/tmp/review.md", "w") as f:
              f.write(f"## 🤖 GPT-5.4 Code Review\n\n{review}\n\n---\n*Model: {model}*\n")
          PYEOF
          python3 /tmp/review.py

      - name: Post review comment
        if: steps.diff.outputs.diff_size != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/review.md
